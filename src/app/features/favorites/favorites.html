@let items = favorites();

@if (items.length === 0) {
  <app-empty-state
    message="You haven't favorited any photos yet."
    actionText="Browse photos"
    (action)="browsePhotos()"
  />
} @else {
  <app-photo-grid
    [photos]="items"
    badge="favorite"
    (photoClick)="viewPhoto($event)"
  />
}
