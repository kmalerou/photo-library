@let loading = isLoading();
@let errorMessage = error();

@if (photos().length === 0) {
  @if (loading) {
    <app-grid>
      @for (placeholder of skeletonPlaceholders; track placeholder) {
        <app-skeleton class="skeleton-tile" />
      }
    </app-grid>
  } @else if (errorMessage) {
    <app-error-state [message]="errorMessage" (retry)="retry()" />
  }
} @else {
  <app-photo-grid [photos]="photos()" (photoClick)="addToFavorites($event)" />

  <div
    appInfiniteScroll
    [disabled]="loading"
    (scrolled)="loadMore()"
    class="scroll-sentinel"
  ></div>

  @if (loading) {
    <app-spinner ariaLabel="Loading more photos" />
  }

  @if (errorMessage) {
    <app-error-state [message]="errorMessage" (retry)="retry()" />
  }
}
