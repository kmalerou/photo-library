@if (photos().length === 0) {
  @if (loading()) {
    <app-grid>
      @for (placeholder of skeletonPlaceholders; track placeholder) {
        <app-skeleton class="skeleton-tile" />
      }
    </app-grid>
  } @else if (error(); as message) {
    <app-error-state [message]="message" (retry)="retry()" />
  }
} @else {
  <app-photo-grid [photos]="photos()" (photoClick)="addToFavorites($event)" />

  <div
    appInfiniteScroll
    [disabled]="loading()"
    (scrolled)="loadMore()"
    class="scroll-sentinel"
  ></div>

  @if (loading()) {
    <app-spinner />
  }

  @if (error(); as message) {
    <app-error-state [message]="message" (retry)="retry()" />
  }
}
