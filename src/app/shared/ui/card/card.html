@let isInteractive = interactive();

<mat-card
  [attr.tabindex]="isInteractive ? 0 : null"
  [attr.role]="isInteractive ? 'button' : null"
  [attr.aria-label]="ariaLabel()"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onSpace($event)"
>
  @if (title(); as cardTitle) {
    <mat-card-header>
      <mat-card-title>{{ cardTitle }}</mat-card-title>
    </mat-card-header>
  }
  <ng-content />
</mat-card>
