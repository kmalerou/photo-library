<mat-card
  [attr.tabindex]="interactive() ? 0 : null"
  [attr.role]="interactive() ? 'button' : null"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onSpace($event)"
>
  @if (title()) {
    <mat-card-header>
      <mat-card-title>{{ title() }}</mat-card-title>
    </mat-card-header>
  }
  <ng-content />
</mat-card>
