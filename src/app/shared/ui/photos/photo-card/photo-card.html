<app-card class="photo-card" [interactive]="true" (cardClick)="cardClick.emit()">
  <img
    appImageFallback
    [src]="photo().url"
    [alt]="'Photo by ' + photo().author"
    loading="lazy"
  />
  @switch (badge()) {
    @case ('favorite') {
      <div class="badge-scrim badge-scrim--favorite">
        <app-icon name="favorite" class="badge-icon" />
      </div>
    }
  }
</app-card>
