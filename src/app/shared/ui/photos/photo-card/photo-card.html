<app-card class="photo-card" [interactive]="true" (cardClick)="cardClick.emit()">
  <img [src]="photo().url" [alt]="'Photo by ' + photo().author" loading="lazy" />
  <app-icon
    class="badge"
    [class.badge--active]="isFavorite()"
    [name]="isFavorite() ? 'favorite' : 'favorite_border'"
  />
</app-card>
