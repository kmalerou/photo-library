@let currentPhoto = photo();

<app-card
  class="photo-card"
  [interactive]="true"
  [ariaLabel]="ariaLabel()"
  (cardClick)="cardClick.emit()"
>
  <img
    appImageFallback
    [src]="currentPhoto.url"
    [alt]="'Photo by ' + currentPhoto.author"
    loading="lazy"
  />
  @switch (badge()) {
    @case ('favorite') {
      <div class="badge-scrim badge-scrim--favorite">
        <app-icon name="favorite" class="badge-icon" />
      </div>
    }
  }
</app-card>
